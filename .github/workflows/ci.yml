name: CI/CD Pipeline

on:
  push:
    branches: ['main']
    tags: ['v*']
  pull_request:
    branches: ['main']
  workflow_dispatch:

jobs:
  # ============================================
  # Stage 1: Build (runs once per Node version)
  # ============================================
  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 23]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        run: corepack enable pnpm && corepack prepare pnpm@9 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

  # ============================================
  # Stage 2: Parallel Test Suites (matrix: suite × node)
  # ============================================
  test:
    name: Test ${{ matrix.suite.name }} (Node ${{ matrix.node-version }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 23]
        suite:
          - name: core-1/5
            path: tests/core/
            timeout: 10
            flags: '--shard=1/5 --no-file-parallelism'
          - name: core-2/5
            path: tests/core/
            timeout: 10
            flags: '--shard=2/5 --no-file-parallelism'
          - name: core-3/5
            path: tests/core/
            timeout: 10
            flags: '--shard=3/5 --no-file-parallelism'
          - name: core-4/5
            path: tests/core/
            timeout: 10
            flags: '--shard=4/5 --no-file-parallelism'
          - name: core-5/5
            path: tests/core/
            timeout: 10
            flags: '--shard=5/5 --no-file-parallelism'
          - name: scheduler
            path: tests/plugins/scheduler/
            timeout: 5
            flags: '--no-file-parallelism'
          - name: api
            path: tests/plugins/api/
            timeout: 3
            flags: '--no-file-parallelism'
          - name: ttl
            path: tests/plugins/ttl/
            timeout: 3
            flags: '--no-file-parallelism'
          - name: state-machine
            path: tests/plugins/state-machine/
            timeout: 3
            flags: '--no-file-parallelism'
          - name: s3-queue
            path: tests/plugins/s3-queue/
            timeout: 3
            flags: '--no-file-parallelism'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        run: corepack enable pnpm && corepack prepare pnpm@9 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.suite.name }} Tests
        run: pnpm vitest run ${{ matrix.suite.path }} --reporter=verbose ${{ matrix.suite.flags }}
        timeout-minutes: ${{ matrix.suite.timeout }}
        env:
          TEST_FORCE_MEMORY_CLIENT: 'false'
          TEST_USE_FILESYSTEM_CLIENT: 'true'
          NODE_OPTIONS: '--max-old-space-size=4096'

  types:
    name: Type Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        run: corepack enable pnpm && corepack prepare pnpm@9 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Type Tests
        run: pnpm run test:ts

  memory:
    name: Memory Guardrail
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        run: corepack enable pnpm && corepack prepare pnpm@9 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run Memory Guardrail
        run: pnpm run benchmark:memory:core:assert

  package:
    name: Package Smoke
    needs: [build, test, types, memory]
    runs-on: ubuntu-latest
    outputs:
      next_version: ${{ steps.meta.outputs.next_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        run: corepack enable pnpm && corepack prepare pnpm@9 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute Package Metadata
        id: meta
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          BASE_VERSION=$(echo "$PACKAGE_VERSION" | cut -d'-' -f1)
          NEXT_VERSION="$BASE_VERSION-next.${GITHUB_SHA::7}"
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Build
        run: pnpm run build

      - name: Prepare Artifact Directory
        run: rm -rf .artifacts && mkdir -p .artifacts

      - name: Create Validation Tarball
        run: node scripts/create-package-tarball.js

      - name: Smoke Test Validation Tarball
        run: node scripts/pack-smoke-check.js .artifacts/*.tgz

      - name: Create Next NPM Tarball
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PACKAGE_TARBALL_VERSION: ${{ steps.meta.outputs.next_version }}
        run: node scripts/create-package-tarball.js

      - name: Smoke Test Next NPM Tarball
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: node scripts/pack-smoke-check.js .artifacts/s3db.js-${{ steps.meta.outputs.next_version }}.tgz

      - name: Create Next GitHub Tarball
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PACKAGE_TARBALL_NAME: '@forattini-dev/s3db.js'
          PACKAGE_TARBALL_VERSION: ${{ steps.meta.outputs.next_version }}
          PACKAGE_TARBALL_REGISTRY: https://npm.pkg.github.com
        run: node scripts/create-package-tarball.js

      - name: Smoke Test Next GitHub Tarball
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PACKAGE_SMOKE_NAME: '@forattini-dev/s3db.js'
        run: node scripts/pack-smoke-check.js .artifacts/forattini-dev-s3db.js-${{ steps.meta.outputs.next_version }}.tgz

      - name: Upload Next Release Artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: release-next-packages
          path: |
            .artifacts/s3db.js-${{ steps.meta.outputs.next_version }}.tgz
            .artifacts/forattini-dev-s3db.js-${{ steps.meta.outputs.next_version }}.tgz
          if-no-files-found: error

      - name: Validate Stable Tag Version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Create Stable GitHub Tarball
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          PACKAGE_TARBALL_NAME: '@forattini-dev/s3db.js'
          PACKAGE_TARBALL_REGISTRY: https://npm.pkg.github.com
        run: node scripts/create-package-tarball.js

      - name: Smoke Test Stable GitHub Tarball
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          PACKAGE_SMOKE_NAME: '@forattini-dev/s3db.js'
        run: node scripts/pack-smoke-check.js .artifacts/forattini-dev-s3db.js-${{ steps.meta.outputs.package_version }}.tgz

      - name: Upload Stable Release Artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-stable-packages
          path: |
            .artifacts/s3db.js-${{ steps.meta.outputs.package_version }}.tgz
            .artifacts/forattini-dev-s3db.js-${{ steps.meta.outputs.package_version }}.tgz
          if-no-files-found: error

  # ============================================
  # Stage 3: Quality Gate (waits for all tests)
  # ============================================
  quality:
    name: Quality Gate
    needs: [build, test, types, memory, package]
    runs-on: ubuntu-latest
    steps:
      - name: All tests passed
        run: echo "All test suites, type tests, memory guardrails, and package smoke checks passed!"

  release-next:
    name: Release Next
    needs: [quality, package]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Check if version bump commit
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$COMMIT_MSG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping: version bump commit"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        if: steps.check.outputs.skip != 'true'
        run: corepack enable pnpm && corepack prepare pnpm@9 --activate

      - name: Setup Node.js (NPM Registry)
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Download Next Release Artifacts
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: release-next-packages
          path: .artifacts

      - name: Publish to NPM (Next)
        if: steps.check.outputs.skip != 'true'
        run: npm publish .artifacts/s3db.js-${{ needs.package.outputs.next_version }}.tgz --tag next --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Node.js (GitHub Packages)
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@forattini-dev'

      - name: Publish to GitHub Packages (Next)
        if: steps.check.outputs.skip != 'true'
        run: npm publish .artifacts/forattini-dev-s3db.js-${{ needs.package.outputs.next_version }}.tgz --tag next --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Job Summary
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "## 🚀 Next Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${{ needs.package.outputs.next_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`next\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | [\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Installation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# NPM" >> $GITHUB_STEP_SUMMARY
          echo "npm install s3db.js@next" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# PNPM" >> $GITHUB_STEP_SUMMARY
          echo "pnpm add s3db.js@next" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Specific version" >> $GITHUB_STEP_SUMMARY
          echo "npm install s3db.js@${{ needs.package.outputs.next_version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [NPM Package](https://www.npmjs.com/package/s3db.js?activeTab=versions)" >> $GITHUB_STEP_SUMMARY
          echo "- [GitHub Packages](https://github.com/${{ github.repository }}/pkgs/npm/s3db.js)" >> $GITHUB_STEP_SUMMARY

      - name: Skip Summary
        if: steps.check.outputs.skip == 'true'
        run: |
          echo "## ⏭️ Release Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version bump commit detected. Skipping @next release." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The stable release will be published via the tag workflow." >> $GITHUB_STEP_SUMMARY

  release-stable:
    name: Release Stable
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        run: corepack enable pnpm && corepack prepare pnpm@9 --activate

      - name: Setup Node.js (NPM Registry)
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Download Stable Release Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-stable-packages
          path: .artifacts

      - name: Publish to NPM (Stable)
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          npm publish .artifacts/s3db.js-$VERSION.tgz --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Node.js (GitHub Packages)
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@forattini-dev'

      - name: Publish to GitHub Packages (Stable)
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          npm publish .artifacts/forattini-dev-s3db.js-$VERSION.tgz --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          echo "## What's Changed" > CHANGELOG_BODY.md
          echo "" >> CHANGELOG_BODY.md

          if [ -n "$PREV_TAG" ]; then
            echo "Changes since $PREV_TAG:" >> CHANGELOG_BODY.md
            echo "" >> CHANGELOG_BODY.md

            FEATURES=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --grep="^feat" 2>/dev/null || true)
            if [ -n "$FEATURES" ]; then
              echo "### 🚀 Features" >> CHANGELOG_BODY.md
              echo "$FEATURES" >> CHANGELOG_BODY.md
              echo "" >> CHANGELOG_BODY.md
            fi

            FIXES=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --grep="^fix" 2>/dev/null || true)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes" >> CHANGELOG_BODY.md
              echo "$FIXES" >> CHANGELOG_BODY.md
              echo "" >> CHANGELOG_BODY.md
            fi

            DOCS=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --grep="^docs" 2>/dev/null || true)
            if [ -n "$DOCS" ]; then
              echo "### 📚 Documentation" >> CHANGELOG_BODY.md
              echo "$DOCS" >> CHANGELOG_BODY.md
              echo "" >> CHANGELOG_BODY.md
            fi

            TESTS=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --grep="^test" 2>/dev/null || true)
            if [ -n "$TESTS" ]; then
              echo "### ✅ Tests" >> CHANGELOG_BODY.md
              echo "$TESTS" >> CHANGELOG_BODY.md
              echo "" >> CHANGELOG_BODY.md
            fi

            CHORE=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --grep="^ci\|^chore" 2>/dev/null || true)
            if [ -n "$CHORE" ]; then
              echo "### 🔧 Maintenance" >> CHANGELOG_BODY.md
              echo "$CHORE" >> CHANGELOG_BODY.md
              echo "" >> CHANGELOG_BODY.md
            fi

            echo "### 👥 Contributors" >> CHANGELOG_BODY.md
            CONTRIBUTORS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/compare/$PREV_TAG...$CURRENT_TAG" \
              | jq -r '.commits[].author.login // empty' | sort -u | grep -v '^$' || true)
            if [ -n "$CONTRIBUTORS" ]; then
              echo "$CONTRIBUTORS" | while read -r user; do
                if [[ ! "$user" =~ \  ]]; then
                  echo "- @$user" >> CHANGELOG_BODY.md
                else
                  echo "- $user" >> CHANGELOG_BODY.md
                fi
              done
            else
              git log $PREV_TAG..HEAD --pretty=format:"- %an" | sort -u >> CHANGELOG_BODY.md
            fi
            echo "" >> CHANGELOG_BODY.md
          else
            echo "Initial release! 🎉" >> CHANGELOG_BODY.md
          fi

          echo "" >> CHANGELOG_BODY.md
          echo "---" >> CHANGELOG_BODY.md
          echo "" >> CHANGELOG_BODY.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...$CURRENT_TAG" >> CHANGELOG_BODY.md
          echo "" >> CHANGELOG_BODY.md
          echo "## 📦 Installation" >> CHANGELOG_BODY.md
          echo "" >> CHANGELOG_BODY.md
          echo "\`\`\`bash" >> CHANGELOG_BODY.md
          echo "# NPM" >> CHANGELOG_BODY.md
          echo "npm install s3db.js@$CURRENT_TAG" >> CHANGELOG_BODY.md
          echo "" >> CHANGELOG_BODY.md
          echo "# PNPM" >> CHANGELOG_BODY.md
          echo "pnpm add s3db.js@$CURRENT_TAG" >> CHANGELOG_BODY.md
          echo "" >> CHANGELOG_BODY.md
          echo "# GitHub Packages" >> CHANGELOG_BODY.md
          echo "npm install @forattini-dev/s3db.js@$CURRENT_TAG --registry=https://npm.pkg.github.com" >> CHANGELOG_BODY.md
          echo "\`\`\`" >> CHANGELOG_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG_BODY.md
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Job Summary
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "## 🎉 Stable Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Git Tag** | [\`v$VERSION\`](${{ github.server_url }}/${{ github.repository }}/releases/tag/v$VERSION) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Installation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# NPM (latest)" >> $GITHUB_STEP_SUMMARY
          echo "npm install s3db.js" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# PNPM" >> $GITHUB_STEP_SUMMARY
          echo "pnpm add s3db.js" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Specific version" >> $GITHUB_STEP_SUMMARY
          echo "npm install s3db.js@$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [GitHub Release](${{ github.server_url }}/${{ github.repository }}/releases/tag/v$VERSION)" >> $GITHUB_STEP_SUMMARY
          echo "- [NPM Package](https://www.npmjs.com/package/s3db.js)" >> $GITHUB_STEP_SUMMARY
          echo "- [GitHub Packages](https://github.com/${{ github.repository }}/pkgs/npm/s3db.js)" >> $GITHUB_STEP_SUMMARY
